version: v1

job:
  name: single-step-raw-sql
  description: single step backfill using raw SQL with CTE

database:
  driver: postgres

partitioning:
  strategy: time_range

  window:
    start: "2025-01-01T00:00:00Z"
    end: "2025-01-02T00:00:00Z"

  adaptive:
    initial_width: 6h
    min_width: 1h
    max_width: 24h
    target_runtime: 30s

runtime:
  defaults:
    concurrency: 1
    max_retries: 0
    max_rows: 0
    statement_timeout: 1h

progress:
  path: ""

steps:
  - name: copy_rows
    morph:
      sql: |
        WITH source_rows AS (
          SELECT id, name, value, ts
          FROM morph_test_source
          WHERE ts >= $1 AND ts < $2
        )
        INSERT INTO morph_test_target (id, name, value, ts)
        SELECT id, name, value, ts
        FROM source_rows
        ON CONFLICT (id) DO NOTHING
