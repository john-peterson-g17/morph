version: v1

job:
  name: { { .Name } }
  description: ""

database:
  driver: postgres

partitioning:
  strategy: time_range

  window:
    start: "2025-01-01T00:00:00Z"
    end: "2025-02-01T00:00:00Z"

  adaptive:
    initial_width: 30m
    min_width: 5m
    max_width: 2h
    target_runtime: 30s

runtime:
  defaults:
    concurrency: 1
    max_retries: 3
    max_rows: 0
    statement_timeout: 1h

progress:
  driver: file
  file:
    path: .morph/progress/{{ .Name }}.v1.progress.json

steps:
  - name: my_step
    # before:
    #   - name: drop index
    #     sql: DROP INDEX IF EXISTS my_index
    #     run: once  # once (default): skip on resume | always: run every time

    morph:
      partition_by: created_at

      from:
        sql: |
          SELECT id, col1, col2, created_at
          FROM source_table

      into:
        sql: |
          INSERT INTO target_table (id, col1, col2, created_at)
          ON CONFLICT (id) DO NOTHING

    # --- OR use raw SQL mode for full control (CTEs, multiple $1/$2 refs, etc.) ---
    # morph:
    #   sql: |
    #     WITH source AS (
    #       SELECT id, col1, col2, created_at
    #       FROM source_table
    #       WHERE created_at >= $1 AND created_at < $2
    #     )
    #     INSERT INTO target_table (id, col1, col2, created_at)
    #     SELECT id, col1, col2, created_at
    #     FROM source
    #     ON CONFLICT (id) DO NOTHING

    # after:
    #   - name: create index
    #     sql: CREATE INDEX CONCURRENTLY IF NOT EXISTS my_index ON target_table (col1)
