version: v1

job:
  name: { { .Name } }
  description: ""

driver: postgres

partitioning:
  strategy: time_range

  window:
    start: "2025-01-01T00:00:00Z"
    end: "2025-02-01T00:00:00Z"

  adaptive:
    initial_width: 30m
    min_width: 5m
    max_width: 2h
    target_runtime: 30s

runtime:
  defaults:
    concurrency: 1
    max_retries: 3
    max_rows: 0
    statement_timeout: 1h

progress:
  path: .morph/{{ .Name }}.progress.json

steps:
  - name: my_step
    # before:
    #   - name: drop index
    #     sql: DROP INDEX IF EXISTS my_index

    morph:
      partition_by: created_at

      from:
        sql: |
          SELECT id, col1, col2, created_at
          FROM source_table

      into:
        sql: |
          INSERT INTO target_table (id, col1, col2, created_at)
          ON CONFLICT (id) DO NOTHING

    # after:
    #   - name: create index
    #     sql: CREATE INDEX CONCURRENTLY IF NOT EXISTS my_index ON target_table (col1)
